<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#012a0f"/>
      <stop offset="50%" style="stop-color:#01420f"/>
      <stop offset="100%" style="stop-color:#013d0f"/>
    </linearGradient>
    <linearGradient id="txt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="30%" style="stop-color:#00aaff"/>
      <stop offset="70%" style="stop-color:#0066ff"/>
      <stop offset="100%" style="stop-color:#00ccff"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00cc66"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="borderglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark green background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Subtle radial center glow -->
  <radialGradient id="cg" cx="50%" cy="50%" r="50%">
    <stop offset="0%" style="stop-color:#025218;stop-opacity:0.8"/>
    <stop offset="100%" style="stop-color:#012a0f;stop-opacity:0"/>
  </radialGradient>
  <rect width="512" height="512" rx="100" fill="url(#cg)"/>

  <!-- Green glowing border -->
  <rect width="512" height="512" rx="100" fill="none" stroke="url(#border)" stroke-width="6" filter="url(#borderglow)"/>

  <!-- Inner border -->
  <rect x="14" y="14" width="484" height="484" rx="88" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.2"/>

  <!-- Corner brackets -->
  <path d="M 44 88 L 44 44 L 88 44" fill="none" stroke="#00ff88" stroke-width="6" stroke-linecap="round" filter="url(#borderglow)"/>
  <path d="M 468 88 L 468 44 L 424 44" fill="none" stroke="#00ff88" stroke-width="6" stroke-linecap="round" filter="url(#borderglow)"/>
  <path d="M 44 424 L 44 468 L 88 468" fill="none" stroke="#00ff88" stroke-width="6" stroke-linecap="round" filter="url(#borderglow)"/>
  <path d="M 468 424 L 468 468 L 424 468" fill="none" stroke="#00ff88" stroke-width="6" stroke-linecap="round" filter="url(#borderglow)"/>

  <!-- PMB blue initials -->
  <text x="256" y="330"
    font-family="'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif"
    font-size="260"
    font-weight="700"
    font-style="italic"
    fill="url(#txt)"
    text-anchor="middle"
    letter-spacing="-8"
    filter="url(#glow)">PMB</text>

</svg>
