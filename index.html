<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ProfitMasterBot v7.4 AI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#050816;
    color:white;
    padding:15px;
}

/* HEADER */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.logo{
    color:#00ff99;
    font-size:26px;
    font-weight:bold;
}

.live{
    color:#00ff99;
    font-size:14px;
}

/* BALANCE */

.balance-card{
    background:linear-gradient(135deg,#00ff99,#008855);
    border-radius:18px;
    padding:20px;
    color:black;
    margin-bottom:20px;
}

.balance-title{
    font-size:15px;
}

.balance{
    font-size:34px;
    font-weight:bold;
    margin-top:10px;
}

.profit{
    margin-top:10px;
    font-size:16px;
}

/* GRID */

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-bottom:20px;
}

.card{
    background:#11182f;
    border-radius:16px;
    padding:15px;
}

.card-title{
    color:#888;
    font-size:14px;
    margin-bottom:10px;
}

.card-value{
    font-size:22px;
    color:#00ff99;
    font-weight:bold;
}

/* SECTION */

.section{
    background:#11182f;
    border-radius:16px;
    padding:18px;
    margin-bottom:20px;
}

.section-title{
    font-size:18px;
    margin-bottom:15px;
    color:#00ff99;
}

/* INPUT */

.input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#08101f;
    color:white;
    margin-bottom:12px;
    font-size:16px;
}

/* BUTTON */

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    font-size:16px;
    font-weight:bold;
    margin-top:10px;
}

.deposit{
    background:#00ff99;
    color:black;
}

.withdraw{
    background:#ffaa00;
    color:black;
}

.stop{
    background:#ff4444;
    color:white;
}

/* CHART */

canvas{
    width:100%;
    background:#08101f;
    border-radius:10px;
    margin-top:10px;
}

/* HISTORY */

.item{
    background:#08101f;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
    font-size:14px;
}

/* OWNER GRID */

.owner-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

/* FOOTER */

.footer{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#0b1026;
    display:flex;
    justify-content:space-around;
    padding:12px;
    border-top:1px solid #1d2747;
}

.nav{
    color:#888;
    font-size:13px;
}

.active{
    color:#00ff99;
}

</style>
</head>

<body>

<div class="header">
    <div class="logo">ProfitMasterBot v7.4 AI</div>
    <div class="live" id="conn">OFFLINE</div>
</div>

<div class="balance-card">
    <div class="balance-title">Total Balance</div>
    <div class="balance" id="balance">$100.00</div>
    <div class="profit" id="profit">Profit Today: +$0.00</div>
</div>

<div class="grid">

    <div class="card">
        <div class="card-title">BTC Price</div>
        <div class="card-value" id="btc">Waiting...</div>
    </div>

    <div class="card">
        <div class="card-title">AI Signal</div>
        <div class="card-value" id="signal">WAITING</div>
    </div>

</div>

<div class="section">
    <div class="section-title">Live Market Chart</div>
    <canvas id="chart" height="150"></canvas>
</div>

<div class="section">

    <div class="section-title">M-Pesa Deposit</div>

    <input type="number" id="depositAmount" class="input" placeholder="Deposit Amount">

    <button class="btn deposit" onclick="depositFunds()">Deposit</button>

</div>

<div class="section">

    <div class="section-title">Withdraw Funds</div>

    <input type="number" id="withdrawAmount" class="input" placeholder="Withdraw Amount">

    <button class="btn withdraw" onclick="withdrawFunds()">Withdraw</button>

</div>

<div class="section">

    <div class="section-title">Transaction History</div>
    <div id="history">
        <div class="item">System initialized</div>
    </div>

</div>

<button class="btn deposit" onclick="connectWS()">START BOT</button>
<button class="btn stop" onclick="disconnectWS()">STOP BOT</button>

<br><br><br><br>

<div class="footer">
    <div class="nav active">Home</div>
    <div class="nav">Markets</div>
    <div class="nav">Wallet</div>
    <div class="nav">AI</div>
</div>

<script>

let ws = null;
let prices = [];

let balance = 100;
let profit = 0;

let totalTrades = 0;

/* =========================
   WEBSOCKET
========================= */

function connectWS(){

    ws = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@trade");

    ws.onopen = () => {
        document.getElementById("conn").innerText = "LIVE";
    };

    ws.onmessage = (event) => {

        let data = JSON.parse(event.data);
        let price = parseFloat(data.p);

        document.getElementById("btc").innerText =
        "$" + price.toFixed(2);

        updateSignal(price);
        drawChart();
    };

    ws.onclose = () => {
        document.getElementById("conn").innerText = "OFFLINE";
    };
}

/* =========================
   AI ENGINE v7.4
========================= */

function updateSignal(price){

    prices.push(price);

    if(prices.length > 30){
        prices.shift();
    }

    if(prices.length < 10) return;

    let up = 0;
    let down = 0;

    for(let i=1;i<prices.length;i++){
        if(prices[i] > prices[i-1]) up++;
        else down++;
    }

    let trendStrength = (up - down) / prices.length;

    let max = Math.max(...prices);
    let min = Math.min(...prices);
    let volatility = (max - min) / min;

    let confidence = Math.abs(trendStrength) * 100;

    let signal = "WAIT";

    if(volatility > 0.01){
        signal = "HIGH VOLATILITY";
    }

    else if(confidence > 60 && trendStrength > 0){
        signal = "BUY";
        balance += Math.random() * 1.5;
        profit += Math.random() * 1.5;
        totalTrades++;
    }

    else if(confidence > 60 && trendStrength < 0){
        signal = "SELL";
        balance += Math.random();
        profit += Math.random();
        totalTrades++;
    }

    document.getElementById("signal").innerText = signal;

    document.getElementById("balance").innerText =
    "$" + balance.toFixed(2);

    document.getElementById("profit").innerText =
    "Profit Today: +$" + profit.toFixed(2);
}

/* =========================
   CHART
========================= */

function drawChart(){

    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(prices.length < 2) return;

    let min = Math.min(...prices);
    let max = Math.max(...prices);
    let range = max - min || 1;

    let step = canvas.width / (prices.length - 1);

    ctx.beginPath();
    ctx.strokeStyle = "#00ff99";
    ctx.lineWidth = 2;

    prices.forEach((p,i)=>{

        let x = i * step;
        let y = canvas.height - ((p-min)/range)*canvas.height;

        if(i === 0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    });

    ctx.stroke();
}

/* =========================
   MPESA
========================= */

function addHistory(text){

    let div = document.createElement("div");
    div.className = "item";
    div.innerText = text;

    document.getElementById("history").prepend(div);
}

function depositFunds(){

    let amount = parseFloat(document.getElementById("depositAmount").value);
    if(!amount) return;

    balance += amount;
    addHistory("Deposit +$" + amount.toFixed(2));
}

function withdrawFunds(){

    let amount = parseFloat(document.getElementById("withdrawAmount").value);
    if(!amount) return;

    if(amount > balance){
        addHistory("Failed withdrawal");
        return;
    }

    balance -= amount;
    addHistory("Withdraw -$" + amount.toFixed(2));
}

/* =========================
   STOP
========================= */

function disconnectWS(){
    if(ws) ws.close();
}

</script>

</body>
</html>
