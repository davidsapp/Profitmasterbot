<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfitMasterBot v10.4</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#05060a;
    color:white;
}

.header{
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:rgba(255,255,255,0.05);
}

.logo{
    color:#00ff99;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:10px;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.card p{
    color:#00aaff;
    font-size:18px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
}

.start{background:#00ff99;}
.stop{background:#ff0044;color:white;}

.panel{
    margin:10px;
    padding:10px;
    background:rgba(255,255,255,0.05);
    border-radius:10px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">ProfitMasterBot</div>
    <div>Status: <span id="status">Idle</span></div>
</div>

<div class="grid">
    <div class="card"><h3>Balance</h3><p id="balance">$0</p></div>
    <div class="card"><h3>Profit</h3><p id="profit">$0</p></div>
    <div class="card"><h3>Accuracy</h3><p id="accuracy">0%</p></div>
    <div class="card"><h3>Bot</h3><p id="bot">Stopped</p></div>
</div>

<div class="buttons">
    <button class="start">START</button>
    <button class="stop">STOP</button>
</div>

<div class="panel" id="log"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    databaseURL: "YOUR_DB",
    projectId: "YOUR_ID",
    appId: "YOUR_APP"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let running = false;
let balance = 0;
let profit = 0;
let accuracy = 0;
let loop = null;

// ELEMENTS
const balanceEl = document.getElementById("balance");
const profitEl = document.getElementById("profit");
const accuracyEl = document.getElementById("accuracy");
const botEl = document.getElementById("bot");
const statusEl = document.getElementById("status");
const logEl = document.getElementById("log");

// START
function startBot(){
    if(running) return;

    running = true;
    botEl.innerText = "Running";
    statusEl.innerText = "Active";
    log("Bot started");

    loop = setInterval(runBot, 2000);
}

// STOP
function stopBot(){
    running = false;
    botEl.innerText = "Stopped";
    statusEl.innerText = "Idle";
    log("Bot stopped");

    clearInterval(loop);
}

// ENGINE
function runBot(){
    let r = Math.random();

    if(r > 0.5){
        let gain = Math.random()*5;
        balance += gain;
        profit += gain;
        log("WIN +" + gain.toFixed(2));
    }else{
        let loss = Math.random()*3;
        balance -= loss;
        profit -= loss;
        log("LOSS -" + loss.toFixed(2));
    }

    accuracy = Math.random()*100;

    updateUI();
    saveData();
}

// UI
function updateUI(){
    balanceEl.innerText = "$" + balance.toFixed(2);
    profitEl.innerText = "$" + profit.toFixed(2);
    accuracyEl.innerText = accuracy.toFixed(1) + "%";
}

// LOG
function log(msg){
    let time = new Date().toLocaleTimeString();
    logEl.innerHTML = `[${time}] ${msg}<br>` + logEl.innerHTML;
}

// SAVE
function saveData(){
    db.ref("bot").set({
        balance,
        profit,
        accuracy,
        running
    });
}

// LOAD
function loadData(){
    db.ref("bot").once("value").then(snap=>{
        let d = snap.val();
        if(!d) return;

        balance = d.balance || 0;
        profit = d.profit || 0;
        accuracy = d.accuracy || 0;

        updateUI();
        log("Data loaded");
    });
}

// BUTTONS
document.querySelector(".start").onclick = startBot;
document.querySelector(".stop").onclick = stopBot;

// INIT
loadData();

</script>

</body>
</html>
