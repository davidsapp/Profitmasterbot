<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ProfitMasterBot v8.0 ADV AI</title>

<style>

body{
    margin:0;
    background:#050816;
    color:white;
    font-family:Arial;
    padding:15px;
}

.header{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}

.logo{
    color:#00ff99;
    font-size:22px;
    font-weight:bold;
}

.status{
    color:#00ff99;
    font-size:13px;
}

/* CARDS */

.card{
    background:#11182f;
    border-radius:14px;
    padding:15px;
    margin-bottom:15px;
}

.title{
    color:#00ff99;
    margin-bottom:10px;
}

.value{
    font-size:22px;
}

/* SIGNAL */

.signal{
    font-size:18px;
    font-weight:bold;
    margin-top:10px;
}

.buy{color:#00ff99;}
.sell{color:#ff4444;}
.wait{color:#ffaa00;}

/* CONFIDENCE BAR */

.barBg{
    width:100%;
    height:10px;
    background:#08101f;
    border-radius:10px;
    margin-top:10px;
}

.barFill{
    height:10px;
    background:#00ff99;
    width:0%;
    border-radius:10px;
    transition:0.3s;
}

</style>
</head>

<body>

<div class="header">
    <div class="logo">AI Advanced v8.0</div>
    <div class="status" id="status">LIVE</div>
</div>

<div class="card">
    <div class="title">BTC Price</div>
    <div id="price">$0</div>

    <div id="signal" class="signal wait">WAIT</div>

    <div class="barBg">
        <div class="barFill" id="confidenceBar"></div>
    </div>

    <div id="confidenceText" style="margin-top:8px;color:#ccc;">
        Confidence: 0%
    </div>
</div>

<div class="card">
    <div class="title">AI Market Intelligence</div>
    <div id="analysis">Analyzing...</div>
</div>

<script>

let ws;
let prices = [];

/* =========================
   ADVANCED AI ENGINE
========================= */

ws = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@trade");

ws.onmessage = (event) => {

    let data = JSON.parse(event.data);
    let price = parseFloat(data.p);

    document.getElementById("price").innerText =
    "$" + price.toFixed(2);

    prices.push(price);
    if(prices.length > 80) prices.shift();

    runAdvancedAI();
};

/* =========================
   PATTERN ENGINE v8
========================= */

function runAdvancedAI(){

    if(prices.length < 15) return;

    let recent = prices.slice(-10);

    let highs = 0;
    let lows = 0;
    let momentum = 0;

    for(let i=1;i<recent.length;i++){

        if(recent[i] > recent[i-1]){
            highs++;
            momentum += (recent[i] - recent[i-1]);
        } else {
            lows++;
            momentum -= (recent[i-1] - recent[i]);
        }
    }

    let volatility =
    (Math.max(...recent) - Math.min(...recent)) / Math.min(...recent);

    /* =========================
       PATTERN SCORING
    ========================= */

    let trendStrength = (highs - lows) / recent.length;

    let momentumScore = momentum / recent.length;

    let rawConfidence =
        (Math.abs(trendStrength) * 50) +
        (Math.abs(momentumScore) * 100);

    /* clamp confidence */
    let confidence = Math.min(100, Math.max(0, rawConfidence * 50));

    /* =========================
       SIGNAL DECISION
    ========================= */

    let signal = "WAIT";
    let cls = "wait";

    if(volatility < 0.02){

        if(trendStrength > 0.25 && confidence > 60){
            signal = "BUY";
            cls = "buy";
        }

        else if(trendStrength < -0.25 && confidence > 60){
            signal = "SELL";
            cls = "sell";
        }
    }

    /* =========================
       OUTPUT UI
    ========================= */

    document.getElementById("signal").innerText = signal;
    document.getElementById("signal").className = "signal " + cls;

    document.getElementById("confidenceText").innerText =
    "Confidence: " + confidence.toFixed(1) + "%";

    document.getElementById("confidenceBar").style.width =
    confidence + "%";

    /* =========================
       MARKET INSIGHT
    ========================= */

    let insight = "";

    if(volatility < 0.01){
        insight = "Stable accumulation zone";
    }
    else if(volatility < 0.02){
        insight = "Normal market movement";
    }
    else{
        insight = "High volatility - avoid entries";
    }

    document.getElementById("analysis").innerText = insight;
}

</script>

</body>
</html>
