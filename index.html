<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfitMasterBot</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

.status {
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    display: inline-block;
}

.connected { background: green; }
.disconnected { background: red; }

button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 6px;
}

.start { background: #22c55e; color: white; }
.stop { background: #ef4444; color: white; }
</style>
</head>

<body>

<div class="container">
    <h1>ProfitMasterBot</h1>

    <div id="wsStatus" class="status disconnected">Disconnected</div>
    <div id="botStatus" class="status">Bot: Idle</div>

    <br>

    <button class="start" onclick="startBot()">Start</button>
    <button class="stop" onclick="stopBot()">Stop</button>
</div>

<script>

let ws;
let reconnectDelay = 1000;

// ======================
// CONNECT WEBSOCKET
// ======================
function connectWS() {

    const wsURL =
        location.hostname === "localhost"
        ? "ws://localhost:3000"
        : "wss://" + location.host;

    console.log("Connecting to:", wsURL);

    ws = new WebSocket(wsURL);

    ws.onopen = () => {
        document.getElementById("wsStatus").innerText = "Connected";
        document.getElementById("wsStatus").className = "status connected";

        reconnectDelay = 1000;
    };

    ws.onmessage = (event) => {
        try {
            const data = JSON.parse(event.data);

            if (data.type === "init" || data.type === "status") {
                updateBot(data.running);
            }
        } catch (e) {}
    };

    ws.onclose = () => {
        document.getElementById("wsStatus").innerText = "Reconnecting...";
        document.getElementById("wsStatus").className = "status disconnected";

        setTimeout(connectWS, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 2, 10000);
    };

    ws.onerror = () => {
        ws.close();
    };
}

// ======================
// UPDATE UI
// ======================
function updateBot(running) {
    const el = document.getElementById("botStatus");

    if (running) {
        el.innerText = "Bot: Running";
        el.style.background = "green";
    } else {
        el.innerText = "Bot: Stopped";
        el.style.background = "red";
    }
}

// ======================
// API CALLS
// ======================
function startBot() {
    fetch("/start", { method: "POST" });
}

function stopBot() {
    fetch("/stop", { method: "POST" });
}

// ======================
// INIT
// ======================
connectWS();

</script>

</body>
</html>
