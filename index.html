<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfitMasterBot v6.4</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

.status {
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    display: inline-block;
}

.connected {
    background: green;
}

.disconnected {
    background: red;
}

button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.start {
    background: #22c55e;
    color: white;
}

.stop {
    background: #ef4444;
    color: white;
}
</style>
</head>

<body>

<div class="container">
    <h1>ProfitMasterBot</h1>

    <div id="wsStatus" class="status disconnected">Disconnected</div>
    <div id="botStatus" class="status">Bot: Idle</div>

    <br>

    <button class="start" onclick="startBot()">Start Bot</button>
    <button class="stop" onclick="stopBot()">Stop Bot</button>
</div>

<script>
let ws;
let reconnectInterval = 2000;
let manualClose = false;

// =========================
// CONNECT WEBSOCKET
// =========================
function connectWS() {

    // IMPORTANT: Railway fix (wss required in production)
    const wsURL =
        location.hostname === "localhost"
        ? "ws://localhost:3000"
        : `wss://${location.host}`;

    ws = new WebSocket(wsURL);

    ws.onopen = () => {
        document.getElementById("wsStatus").innerText = "Connected";
        document.getElementById("wsStatus").className = "status connected";
        console.log("WebSocket connected");
    };

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (data.type === "init" || data.type === "status") {
            updateBotStatus(data.running);
        }
    };

    ws.onclose = () => {
        document.getElementById("wsStatus").innerText = "Disconnected";
        document.getElementById("wsStatus").className = "status disconnected";
        console.log("WebSocket disconnected");

        // Auto reconnect (CRITICAL FIX)
        if (!manualClose) {
            setTimeout(connectWS, reconnectInterval);
        }
    };

    ws.onerror = (err) => {
        console.log("WebSocket error:", err);
        ws.close();
    };
}

// =========================
// UPDATE UI
// =========================
function updateBotStatus(running) {
    const el = document.getElementById("botStatus");

    if (running) {
        el.innerText = "Bot: Running";
        el.style.background = "green";
    } else {
        el.innerText = "Bot: Stopped";
        el.style.background = "red";
    }
}

// =========================
// START BOT
// =========================
function startBot() {
    fetch("/start", { method: "POST" });
}

// =========================
// STOP BOT
// =========================
function stopBot() {
    fetch("/stop", { method: "POST" });
}

// =========================
// INIT
// =========================
connectWS();
</script>

</body>
</html>
