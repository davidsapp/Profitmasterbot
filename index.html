<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfitMasterBot v6.4 AI</title>
</head>

<body style="margin:0;background:#050816;color:white;font-family:Arial;text-align:center;padding:15px;">

<h1 style="color:#00ff99;">ProfitMasterBot v6.4 AI Engine</h1>
<p>Powered by David Maina</p>

<hr style="border:1px solid #00ff99;">

<h2>BTC Price</h2>
<p id="btc" style="font-size:24px;color:#00ff99;">Loading...</p>

<h2>Market Trend</h2>
<p id="trend">ANALYZING...</p>

<h2>AI Signal</h2>
<p id="signal">WAITING</p>

<h2>Balance</h2>
<p id="balance">$100.00</p>

<h2>Profit</h2>
<p id="profit">+$0.00</p>

<hr style="border:1px solid #00ff99;">

<h2>Live Chart</h2>
<canvas id="chart" width="320" height="120" style="background:#08101f;border:1px solid #00ff99;border-radius:10px;"></canvas>

<br><br>

<button onclick="startBot()" style="padding:15px;width:80%;background:#00ff99;border:none;font-weight:bold;">START AI BOT</button>

<button onclick="stopBot()" style="padding:15px;width:80%;margin-top:10px;background:#ff4444;border:none;font-weight:bold;color:white;">STOP BOT</button>

<script>

let running = false;
let balance = 100;
let profit = 0;
let btcPrice = 65000;

let prices = [];

/* REAL BTC PRICE */
async function updateBTC(){
    try {
        const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd");
        const data = await res.json();

        btcPrice = data.bitcoin.usd;

        document.getElementById("btc").innerText = "$" + btcPrice;

        prices.push(btcPrice);
        if(prices.length > 20) prices.shift();

        updateTrend();
        drawChart();

    } catch (e) {
        document.getElementById("btc").innerText = "Error";
    }
}

/* =========================
   AI ENGINE (RULE BASED)
   ========================= */

function calculateTrend(){

    if(prices.length < 5) return "NEUTRAL";

    let recent = prices.slice(-5);

    let up = 0;
    let down = 0;

    for(let i=1;i<recent.length;i++){
        if(recent[i] > recent[i-1]) up++;
        else down++;
    }

    if(up >= 3) return "UPTREND";
    if(down >= 3) return "DOWNTREND";
    return "SIDEWAYS";
}

function generateSignal(trend){

    if(trend === "UPTREND") return "BUY";
    if(trend === "DOWNTREND") return "SELL";

    return Math.random() > 0.5 ? "BUY" : "SELL";
}

function updateTrend(){

    let trend = calculateTrend();
    document.getElementById("trend").innerText = trend;

    let signal = generateSignal(trend);
    document.getElementById("signal").innerText = signal;

    executeTrade(signal);
}

/* =========================
   TRADING ENGINE
   ========================= */

function executeTrade(signal){

    if(!running) return;

    let gain = 0;

    if(signal === "BUY"){
        gain = Math.random() * 3.5;
    } 
    else if(signal === "SELL"){
        gain = Math.random() * 2.5;
    } 
    else {
        gain = Math.random() * 0.5;
    }

    balance += gain;
    profit += gain;

    document.getElementById("balance").innerText = "$" + balance.toFixed(2);
    document.getElementById("profit").innerText = "+$" + profit.toFixed(2);
}

/* =========================
   CHART SYSTEM
   ========================= */

function drawChart(){

    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle = "#00ff99";
    ctx.beginPath();

    let step = canvas.width / prices.length;

    prices.forEach((p,i)=>{

        let x = i * step;
        let y = canvas.height - (p % 1000) / 5;

        if(i === 0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    });

    ctx.stroke();
}

/* =========================
   CONTROL
   ========================= */

function startBot(){

    if(running) return;
    running = true;

    updateBTC();
    setInterval(updateBTC, 10000);
}

function stopBot(){
    running = false;
}

</script>

</body>
</html>
