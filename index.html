<body>

<!-- ALL YOUR DASHBOARD HTML ABOVE -->
<!-- header, cards, buttons, panels -->

<!-- IMPORTANT: buttons must exist before script runs -->

<button class="start">START BOT</button>
<button class="stop">STOP BOT</button>

<div class="log"></div>

<!-- SCRIPT MUST GO HERE (AT VERY END) -->
<script>
let botRunning = false;
let balance = 0;
let profit = 0;
let accuracy = 0;

const balanceEl = document.querySelectorAll(".card p")[0];
const profitEl = document.querySelectorAll(".card p")[1];
const accuracyEl = document.querySelectorAll(".card p")[2];
const botStatusEl = document.querySelectorAll(".card p")[3];
const logBox = document.querySelector(".log");

// START BOT
function startBot(){
    if(botRunning) return;

    botRunning = true;
    botStatusEl.innerText = "Running";
    log("Bot started... scanning market signals");

    runEngine();
}

// STOP BOT
function stopBot(){
    botRunning = false;
    botStatusEl.innerText = "Stopped";
    log("Bot stopped manually");
}

// ENGINE LOOP
function runEngine(){
    if(!botRunning) return;

    setTimeout(() => {

        let tradeResult = Math.random();

        if(tradeResult > 0.5){
            let gain = Math.random() * 5;
            balance += gain;
            profit += gain;
            log("Trade WIN +$" + gain.toFixed(2));
        } else {
            let loss = Math.random() * 3;
            balance -= loss;
            profit -= loss;
            log("Trade LOSS -$" + loss.toFixed(2));
        }

        accuracy = Math.random() * 100;

        updateUI();
        runEngine();

    }, 2000);
}

// UPDATE UI
function updateUI(){
    balanceEl.innerText = "$" + balance.toFixed(2);
    profitEl.innerText = (profit >= 0 ? "+" : "") + "$" + profit.toFixed(2);
    accuracyEl.innerText = accuracy.toFixed(1) + "%";
}

// LOG SYSTEM
function log(msg){
    let time = new Date().toLocaleTimeString();
    logBox.innerHTML = `[${time}] ${msg}<br>` + logBox.innerHTML;
}

// BUTTON EVENTS
document.addEventListener("DOMContentLoaded", () => {
    document.querySelector(".start").addEventListener("click", startBot);
    document.querySelector(".stop").addEventListener("click", stopBot);
});
</script>

</body>
</html>
