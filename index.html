<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfitMasterBot v11</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#05060a;
    color:white;
}

/* LOGIN */
#authBox{
    display:block;
    padding:20px;
    text-align:center;
}

input{
    padding:10px;
    width:80%;
    margin:5px;
    border-radius:8px;
    border:none;
}

/* DASHBOARD */
#dashboard{
    display:none;
}

.header{
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:rgba(255,255,255,0.05);
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:10px;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:10px;
    text-align:center;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.start{background:#00ff99;}
.stop{background:#ff0044;color:white;}
.logout{background:#ffaa00;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="authBox">
    <h2>ProfitMasterBot Login</h2>
    <input id="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Password"><br>

    <button id="signupBtn">Sign Up</button>
    <button id="loginBtn">Login</button>

    <p id="msg"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
    <div class="header">
        <div>ProfitMasterBot</div>
        <button class="logout" id="logoutBtn">Logout</button>
    </div>

    <div class="grid">
        <div class="card"><h3>Balance</h3><p id="balance">$0</p></div>
        <div class="card"><h3>Profit</h3><p id="profit">$0</p></div>
        <div class="card"><h3>Status</h3><p id="status">Idle</p></div>
        <div class="card"><h3>Bot</h3><p id="bot">Stopped</p></div>
    </div>

    <button class="start" id="startBtn">START</button>
    <button class="stop" id="stopBtn">STOP</button>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* 🔴 PUT YOUR REAL FIREBASE CONFIG HERE */
const firebaseConfig = {
  apiKey: "PASTE_HERE",
  authDomain: "PASTE_HERE",
  projectId: "PASTE_HERE",
  storageBucket: "PASTE_HERE",
  messagingSenderId: "PASTE_HERE",
  appId: "PASTE_HERE"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* UI */
const authBox = document.getElementById("authBox");
const dashboard = document.getElementById("dashboard");

/* LOGIN */
document.getElementById("signupBtn").onclick = async () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        await createUserWithEmailAndPassword(auth, email, password);
    } catch (e) {
        document.getElementById("msg").innerText = e.message;
    }
};

document.getElementById("loginBtn").onclick = async () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        await signInWithEmailAndPassword(auth, email, password);
    } catch (e) {
        document.getElementById("msg").innerText = e.message;
    }
};

document.getElementById("logoutBtn").onclick = async () => {
    await signOut(auth);
};

/* AUTH STATE */
onAuthStateChanged(auth, (user) => {
    if (user) {
        authBox.style.display = "none";
        dashboard.style.display = "block";
    } else {
        authBox.style.display = "block";
        dashboard.style.display = "none";
    }
});
</script>

</body>
</html>
