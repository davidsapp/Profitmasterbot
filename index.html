<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfitMasterBot v6.4</title>

<style>
body{margin:0;font-family:Arial;background:#0a0f1f;color:#fff}
.screen{display:none;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;padding:20px}
.screen.active{display:flex}
.btn{padding:12px;border-radius:10px;border:none;width:100%;margin-top:10px;cursor:pointer}
.btn-neon{background:#00ff88;color:#000;font-weight:bold}
.btn-outline{background:transparent;border:1px solid #00ff88;color:#00ff88}
.pin-dot{width:10px;height:10px;border-radius:50%;border:1px solid #aaa;margin:5px}
.pin-dot.filled{background:#00ff88}
.lock-overlay{position:fixed;inset:0;background:#000;display:none;align-items:center;justify-content:center;flex-direction:column;z-index:999}
.lock-overlay.show{display:flex}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="screen active">
<h2>ProfitMasterBot v6.4</h2>
<p>Loading system...</p>
</div>

<!-- LOGIN -->
<div id="login" class="screen">
<h2>Enter PIN</h2>

<div>
<span class="pin-dot" id="d0"></span>
<span class="pin-dot" id="d1"></span>
<span class="pin-dot" id="d2"></span>
<span class="pin-dot" id="d3"></span>
</div>

<p id="err" style="color:red"></p>

<div>
<button onclick="pt(1)">1</button>
<button onclick="pt(2)">2</button>
<button onclick="pt(3)">3</button>
<button onclick="pt(4)">4</button>
<button onclick="pt(5)">5</button>
<button onclick="pt(6)">6</button>
<button onclick="pt(7)">7</button>
<button onclick="pt(8)">8</button>
<button onclick="pt(9)">9</button>
<button onclick="pt(0)">0</button>
</div>
</div>

<!-- APP -->
<div id="app" class="screen">
<h2>Dashboard v6.4</h2>

<button class="btn btn-neon" onclick="lockApp()">Lock App</button>
<button class="btn btn-outline" onclick="checkBackend()">Check Backend</button>
</div>

<!-- LOCK -->
<div class="lock-overlay" id="lock">
<h2 style="color:white">Locked</h2>

<div style="display:flex">
<span class="pin-dot" id="ld0"></span>
<span class="pin-dot" id="ld1"></span>
<span class="pin-dot" id="ld2"></span>
<span class="pin-dot" id="ld3"></span>
</div>

<input id="lp" type="password" placeholder="PIN">
<button onclick="unlock()">Unlock</button>
</div>

<script>

var PIN = localStorage.getItem("pmb_pin") || "1234";
var input = "";

/* BOOT */
document.addEventListener("DOMContentLoaded",function(){
setTimeout(()=>show("login"),800);
});

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* LOGIN */
function pt(d){
if(input.length>=4) return;
input += d;
dots("d",input);

if(input.length===4){
if(input===PIN){
input="";
show("app");
}else{
document.getElementById("err").innerText="Wrong PIN";
input="";
dots("d","");
}
}
}

function dots(p,v){
for(let i=0;i<4;i++){
let el=document.getElementById(p+i);
if(el) el.classList.toggle("filled",i<v.length);
}
}

/* LOCK */
function lockApp(){
document.getElementById("lock").classList.add("show");
}

function unlock(){
let v=document.getElementById("lp").value;
if(v===PIN){
document.getElementById("lock").classList.remove("show");
}
else alert("Wrong PIN");
}

/* BACKEND */
function checkBackend(){
fetch("https://profitmasterbot-backend-production-11dd.up.railway.app/")
.then(r=>r.json())
.then(d=>alert("Backend OK: "+d.status))
.catch(()=>alert("Backend offline"));
}

</script>

</body>
</html>
