<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#050d1a">

<title>ProfitMasterBot v6.4</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#050d1a;
  color:#e8f4fd;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#0a1628;
  border-bottom:1px solid #1a3a5c;
}

/* STATUS */
.status{
  font-size:12px;
  font-weight:800;
}
.live{color:#00ff88;}
.off{color:#ff3366;}

/* LAYOUT */
.page{
  display:none;
  padding:12px;
}
.page.active{
  display:block;
}

/* CARDS */
.card{
  background:#0a1628;
  border:1px solid #1a3a5c;
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
}

.value{
  font-size:26px;
  font-weight:900;
  color:#00ff88;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#0a1628;
  border-top:1px solid #1a3a5c;
  display:flex;
  justify-content:space-around;
  padding:8px 0;
}

.nav button{
  background:none;
  border:none;
  color:#6b8db0;
  font-size:11px;
  font-weight:700;
}

.nav button.active{
  color:#00ff88;
}

/* BADGE */
.badge{
  display:inline-block;
  padding:4px 10px;
  font-size:11px;
  border-radius:20px;
  background:#00ff8822;
  color:#00ff88;
  border:1px solid #00ff8855;
}
</style>
</head>

<body>

<div class="topbar">
  <div>ProfitMasterBot v6.4</div>
  <div id="status" class="status off">● CONNECTING</div>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <div class="card">
    <div>Total Portfolio</div>
    <div id="portfolio" class="value">$0.00</div>
  </div>

  <div class="card">
    <div>Daily Profit</div>
    <div id="profit" class="value">+$0.00</div>
  </div>

  <div class="card">
    <div class="badge">LIVE SYNC ACTIVE</div>
  </div>
</div>

<!-- PORTFOLIO -->
<div id="portfolioPage" class="page">
  <div class="card">
    <h3>Portfolio Breakdown</h3>
    <p>BTC: 45%</p>
    <p>ETH: 28%</p>
    <p>USDT: 27%</p>
  </div>
</div>

<!-- SIGNALS -->
<div id="signals" class="page">
  <div class="card">
    <h3>AI Signals</h3>
    <p>BTC/USDT → BUY</p>
    <p>ETH/USDT → SELL</p>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings" class="page">
  <div class="card">
    <h3>Settings</h3>
    <p>Auto Trade: ON</p>
    <p>Risk Level: Medium</p>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="show('home')" class="active">Home</button>
  <button onclick="show('portfolioPage')">Portfolio</button>
  <button onclick="show('signals')">Signals</button>
  <button onclick="show('settings')">Settings</button>
</div>

<script>

/* =========================
   PAGE SWITCHER
========================= */
function show(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');

  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
}

/* =========================
   LIVE SYNC ENGINE
========================= */
const API = "/api/dashboard";

async function load(){
  try{
    const res = await fetch(API,{cache:"no-store"});
    const data = await res.json();

    document.getElementById("portfolio").innerText =
      "$" + Number(data.portfolio).toLocaleString();

    document.getElementById("profit").innerText =
      "+$" + Number(data.profit).toLocaleString();

    setStatus(true);

  }catch(e){
    setStatus(false);

    // fallback demo
    document.getElementById("portfolio").innerText = "$24,831";
    document.getElementById("profit").innerText = "+$1,247";
  }
}

/* =========================
   STATUS
========================= */
function setStatus(ok){
  const el = document.getElementById("status");
  if(ok){
    el.innerText = "● LIVE";
    el.className = "status live";
  }else{
    el.innerText = "● OFFLINE";
    el.className = "status off";
  }
}

/* =========================
   AUTO REFRESH
========================= */
load();
setInterval(load, 5000);

</script>

</body>
</html>
