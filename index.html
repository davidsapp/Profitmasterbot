<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ProfitMasterBot v7.8 AI MEMORY</title>

<style>

body{
    margin:0;
    background:#050816;
    color:white;
    font-family:Arial;
    padding:15px;
}

.header{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}

.logo{
    color:#00ff99;
    font-size:22px;
    font-weight:bold;
}

.status{
    color:#00ff99;
    font-size:13px;
}

/* CARDS */

.card{
    background:#11182f;
    border-radius:14px;
    padding:15px;
    margin-bottom:15px;
}

.title{
    color:#00ff99;
    margin-bottom:10px;
}

/* SIGNAL */

.signal{
    font-size:18px;
    font-weight:bold;
    margin-top:10px;
}

.buy{color:#00ff99;}
.sell{color:#ff4444;}
.wait{color:#ffaa00;}

/* CHART */

canvas{
    width:100%;
    background:#08101f;
    border-radius:10px;
}

/* STATS */

.stat{
    font-size:14px;
    margin-top:6px;
    color:#ccc;
}

.value{
    color:#00ff99;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
    <div class="logo">AI Memory v7.8</div>
    <div class="status" id="status">LIVE</div>
</div>

<div class="card">
    <div class="title">BTC Price</div>
    <div id="price">$0</div>
    <div id="signal" class="signal wait">WAITING</div>
</div>

<div class="card">
    <div class="title">AI Memory Stats</div>

    <div class="stat">Trades: <span class="value" id="trades">0</span></div>
    <div class="stat">Wins: <span class="value" id="wins">0</span></div>
    <div class="stat">Losses: <span class="value" id="losses">0</span></div>
    <div class="stat">Win Rate: <span class="value" id="winrate">0%</span></div>
    <div class="stat">AI Confidence Boost: <span class="value" id="boost">1.0x</span></div>

</div>

<div class="card">
    <div class="title">Live Chart</div>
    <canvas id="chart" height="160"></canvas>
</div>

<script>

let ws;
let prices = [];

/* =========================
   AI MEMORY ENGINE
========================= */

let trades = 0;
let wins = 0;
let losses = 0;

let balance = 100;
let lastTradePrice = null;

let confidenceBoost = 1.0;

/* =========================
   CONNECT
========================= */

ws = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@trade");

ws.onopen = () => {
    document.getElementById("status").innerText = "LIVE";
};

ws.onmessage = (event) => {

    let data = JSON.parse(event.data);
    let price = parseFloat(data.p);

    document.getElementById("price").innerText =
    "$" + price.toFixed(2);

    prices.push(price);
    if(prices.length > 60) prices.shift();

    runAI(price);
    drawChart();
};

/* =========================
   AI MEMORY LOGIC
========================= */

function runAI(price){

    if(prices.length < 10) return;

    let up = 0;
    let down = 0;

    for(let i=1;i<prices.length;i++){
        if(prices[i] > prices[i-1]) up++;
        else down++;
    }

    let trend = (up - down) / prices.length;

    let max = Math.max(...prices);
    let min = Math.min(...prices);
    let volatility = (max - min) / min;

    let signal = "WAIT";
    let cls = "wait";

    /* =========================
       MEMORY BOOST EFFECT
    ========================= */

    let adjustedTrend = trend * confidenceBoost;

    /* =========================
       SIGNAL LOGIC
    ========================= */

    if(volatility < 0.015){

        if(adjustedTrend > 0.03){
            signal = "BUY";
            cls = "buy";
            executeTrade(price, "BUY");
        }

        else if(adjustedTrend < -0.03){
            signal = "SELL";
            cls = "sell";
            executeTrade(price, "SELL");
        }
    }

    document.getElementById("signal").innerText = signal;
    document.getElementById("signal").className = "signal " + cls;
}

/* =========================
   TRADE MEMORY SYSTEM
========================= */

function executeTrade(price, type){

    trades++;

    if(lastTradePrice !== null){

        if((type === "BUY" && price > lastTradePrice) ||
           (type === "SELL" && price < lastTradePrice)){

            wins++;
            confidenceBoost += 0.02;

        } else {

            losses++;
            confidenceBoost -= 0.03;

            if(confidenceBoost < 0.5) confidenceBoost = 0.5;
        }
    }

    lastTradePrice = price;

    updateStats();
}

/* =========================
   STATS UI
========================= */

function updateStats(){

    let winRate = trades === 0 ? 0 : (wins / trades) * 100;

    document.getElementById("trades").innerText = trades;
    document.getElementById("wins").innerText = wins;
    document.getElementById("losses").innerText = losses;
    document.getElementById("winrate").innerText = winRate.toFixed(1) + "%";
    document.getElementById("boost").innerText = confidenceBoost.toFixed(2) + "x";
}

/* =========================
   CHART
========================= */

function drawChart(){

    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(prices.length < 2) return;

    let min = Math.min(...prices);
    let max = Math.max(...prices);
    let range = max - min || 1;

    let step = canvas.width / (prices.length - 1);

    ctx.beginPath();
    ctx.strokeStyle = "#00ff99";
    ctx.lineWidth = 2;

    prices.forEach((p,i)=>{

        let x = i * step;
        let y = canvas.height - ((p-min)/range)*canvas.height;

        if(i === 0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    });

    ctx.stroke();
}

</script>

</body>
</html>
