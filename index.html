<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">

<title>ProfitMasterBot v6.3 LIVE</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#050d1a;
  color:#e8f4fd;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#0a1628;
  border-bottom:1px solid #1a3a5c;
}

.status{
  font-weight:800;
  font-size:12px;
}

.live{color:#00ff88;}
.error{color:#ff3366;}

/* CARDS */
.card{
  margin:12px;
  padding:14px;
  background:#0a1628;
  border:1px solid #1a3a5c;
  border-radius:14px;
}

.value{
  font-size:28px;
  font-weight:900;
  color:#00ff88;
}

/* LOADING */
.loading{
  opacity:0.6;
}

/* HOME */
.container{
  padding:10px;
}
</style>
</head>

<body>

<div class="topbar">
  <div>ProfitMasterBot v6.3</div>
  <div id="status" class="status">● LOADING...</div>
</div>

<div class="container">

  <div class="card">
    <div>Total Portfolio</div>
    <div id="portfolio" class="value loading">$0.00</div>
  </div>

  <div class="card">
    <div>Daily Profit</div>
    <div id="profit" class="value loading">+$0.00</div>
  </div>

  <div class="card">
    <div>Win Rate</div>
    <div id="winrate" class="value loading">0%</div>
  </div>

  <div class="card">
    <div>Live Trades</div>
    <div id="trades" class="loading">Loading...</div>
  </div>

</div>

<script>

/* =========================
   CONFIG (CHANGE THIS)
========================= */
const API_URL = "/api/dashboard"; 
// If Railway fails, replace with:
// https://your-app.up.railway.app/api/dashboard

let last = null;

/* =========================
   FETCH DATA
========================= */
async function loadDashboard(){
  try{
    const res = await fetch(API_URL, { cache: "no-store" });

    if(!res.ok) throw new Error("API error");

    const data = await res.json();

    updateUI(data);

    setStatus(true);

  }catch(err){
    console.log("Backend error:", err);

    setStatus(false);

    // fallback demo data so UI is NOT blank
    updateUI({
      portfolio: 24831,
      profit: 1247,
      winrate: 84.2,
      trades: [
        {pair:"BTC/USDT", pnl:"+124"},
        {pair:"ETH/USDT", pnl:"+67"}
      ]
    });
  }
}

/* =========================
   UPDATE UI
========================= */
function updateUI(data){

  if(!data) return;

  document.getElementById("portfolio").innerText =
    `$${Number(data.portfolio).toLocaleString()}`;

  document.getElementById("profit").innerText =
    `+$${Number(data.profit).toLocaleString()}`;

  document.getElementById("winrate").innerText =
    `${data.winrate}%`;

  let html = "";
  (data.trades || []).forEach(t=>{
    html += `• ${t.pair} ${t.pnl}<br>`;
  });

  document.getElementById("trades").innerHTML = html;
}

/* =========================
   STATUS INDICATOR
========================= */
function setStatus(ok){
  const el = document.getElementById("status");

  if(ok){
    el.innerText = "● LIVE";
    el.className = "status live";
  }else{
    el.innerText = "● OFFLINE (fallback)";
    el.className = "status error";
  }
}

/* =========================
   AUTO SYNC LOOP
========================= */
loadDashboard();
setInterval(loadDashboard, 5000);

</script>

</body>
</html>
