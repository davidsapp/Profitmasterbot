<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfitMasterBot v6.4 - Stage 7</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0f1f;
    color: #ffffff;
}

header {
    padding: 15px;
    background: #121a33;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

.container {
    padding: 15px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 15px;
}

.card {
    background: #121a33;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,255,136,0.2);
}

.status {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
}

.green { color: #00ff88; }
.red { color: #ff4d4d; }
.yellow { color: #ffd000; }

button {
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 8px;
    background: #00ff88;
    color: #000;
    font-weight: bold;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background: #00cc6a;
}

.log {
    height: 200px;
    overflow-y: auto;
    background: #0f1730;
    padding: 10px;
    font-size: 12px;
    border-radius: 8px;
}

.small {
    font-size: 12px;
    opacity: 0.8;
}
</style>
</head>

<body>

<header>
🚀 ProfitMasterBot v6.4 - STAGE 7 LIVE DASHBOARD
</header>

<div class="container">

    <!-- CONNECTION STATUS -->
    <div class="card">
        <h3>Connection Status</h3>
        <div class="status">
            <div>Server: <span id="serverStatus" class="yellow">Checking...</span></div>
            <div>Bot: <span id="botStatus" class="yellow">Idle</span></div>
        </div>
    </div>

    <!-- LIVE STATS -->
    <div class="card">
        <h3>Live Trading Stats</h3>
        <div class="status">
            <div>Balance: <span id="balance">$0.00</span></div>
            <div>Profit: <span id="profit" class="green">$0.00</span></div>
        </div>
        <div class="status">
            <div>Daily Loss: <span id="loss" class="red">0%</span></div>
            <div>Trades: <span id="trades">0</span></div>
        </div>
    </div>

    <!-- CONTROL PANEL -->
    <div class="card">
        <h3>Bot Control</h3>
        <button onclick="startBot()">Start Bot</button>
        <button onclick="stopBot()">Stop Bot</button>
        <p class="small">Stage 7: SSE Live Sync Enabled</p>
    </div>

    <!-- LOGS -->
    <div class="card">
        <h3>Live Trade Logs</h3>
        <div class="log" id="logBox"></div>
    </div>

</div>

<script>
