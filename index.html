<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfitMasterBot Dashboard</title>

<style>
:root{
  --bg:#0a0f1f;
  --card:#121a33;
  --card2:#0f1730;
  --neon:#00ff88;
  --text:#ffffff;
  --danger:#ff4d4d;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  padding:15px;
  background:linear-gradient(90deg,#0f1730,#121a33);
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #1f2a4a;
}

.logo{
  font-weight:bold;
  color:var(--neon);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  padding:15px;
}

/* CARD */
.card{
  background:var(--card);
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,255,136,0.1);
}

.title{
  font-size:14px;
  opacity:0.7;
}

.value{
  font-size:22px;
  margin-top:5px;
  color:var(--neon);
}

/* BUTTON */
button{
  background:var(--neon);
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  opacity:0.8;
}

/* STATUS */
.status{
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
  background:#1f2a4a;
  display:inline-block;
}

.online{ color:var(--neon); }
.offline{ color:var(--danger); }

/* LOCK SCREEN */
.lock{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

input{
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:10px;
  width:200px;
}
</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div class="lock" id="lock">
  <h2>ProfitMasterBot Locked</h2>
  <input type="password" id="pass" placeholder="Enter Password">
  <button onclick="unlock()">Unlock</button>
</div>

<!-- HEADER -->
<div class="header">
  <div class="logo">ProfitMasterBot</div>
  <div class="status online" id="status">CONNECTED</div>
</div>

<!-- DASHBOARD -->
<div class="grid">

  <div class="card">
    <div class="title">Account Balance</div>
    <div class="value" id="balance">$1,250.00</div>
  </div>

  <div class="card">
    <div class="title">Today's Profit</div>
    <div class="value" id="profit">+$45.20</div>
  </div>

  <div class="card">
    <div class="title">Active Trades</div>
    <div class="value">3</div>
  </div>

  <div class="card">
    <div class="title">Bot Status</div>
    <div class="value">RUNNING</div>
  </div>

</div>

<!-- CONTROLS -->
<div class="grid">

  <div class="card">
    <h3>Bot Control</h3>
    <button onclick="startBot()">Start</button>
    <button onclick="stopBot()">Stop</button>
  </div>

  <div class="card">
    <h3>Risk Level</h3>
    <p>Auto Risk: ON</p>
  </div>

</div>

<script>
function unlock(){
  const pass = document.getElementById("pass").value;
  if(pass === "1234"){
    document.getElementById("lock").style.display="none";
  } else {
    alert("Wrong Password");
  }
}

function startBot(){
  alert("Bot Started");
}

function stopBot(){
  alert("Bot Stopped");
}

// fake live updates
setInterval(()=>{
  let p = (Math.random()*100).toFixed(2);
  document.getElementById("profit").innerText = "+"+p;
},3000);
</script>

</body>
</html>
