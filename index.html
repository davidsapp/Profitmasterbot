<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfitMasterBot v6.4</title>

<style>
:root{
--bg:#0a0f1f;
--card:#121a33;
--card2:#0f1730;
--neon:#00ff88;
--gold:#ffd700;
--cyan:#00ccff;
--red:#ff3366;
--blue:#4da3ff;
--white:#ffffff;
--grey:#9aa4b2;
--border:#1f2a4a;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--white);
}

.screen{display:none;padding:20px}
.screen.active{display:block}

.center{text-align:center}

/* buttons */
.btn{padding:12px;border-radius:10px;border:none;width:100%;margin-top:10px}
.btn-neon{background:var(--neon);color:#000;font-weight:bold}
.btn-outline{background:transparent;border:1px solid var(--neon);color:var(--neon)}

/* lock */
.lock-overlay{
position:fixed;
inset:0;
background:#000;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}
.lock-overlay.show{display:flex}

.pin-dot{
width:10px;height:10px;border-radius:50%;
border:1px solid var(--grey);
margin:5px;
}
.pin-dot.filled{background:var(--neon)}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="screen active center">
<h2>ProfitMasterBot v6.4</h2>
<p>Loading...</p>
</div>

<!-- LOGIN -->
<div id="login" class="screen center">
<h2>Enter PIN</h2>
<div id="dots">
<span class="pin-dot" id="d0"></span>
<span class="pin-dot" id="d1"></span>
<span class="pin-dot" id="d2"></span>
<span class="pin-dot" id="d3"></span>
</div>

<p id="pin-err" style="color:red"></p>

<div>
<button onclick="pt(1)">1</button>
<button onclick="pt(2)">2</button>
<button onclick="pt(3)">3</button>
<button onclick="pt(4)">4</button>
<button onclick="pt(5)">5</button>
<button onclick="pt(6)">6</button>
<button onclick="pt(7)">7</button>
<button onclick="pt(8)">8</button>
<button onclick="pt(9)">9</button>
<button onclick="pt(0)">0</button>
</div>
</div>

<!-- APP -->
<div id="app" class="screen">

<h2>Dashboard v6.4</h2>

<button class="btn btn-neon" onclick="lockApp()">Lock App</button>
<button class="btn btn-outline" onclick="checkBackend()">Check Backend</button>

</div>

<!-- LOCK -->
<div class="lock-overlay" id="lock-overlay">
<h2>Locked</h2>

<div style="display:flex">
<span class="pin-dot" id="ld0"></span>
<span class="pin-dot" id="ld1"></span>
<span class="pin-dot" id="ld2"></span>
<span class="pin-dot" id="ld3"></span>
</div>

<input type="password" id="lock-input" placeholder="Enter PIN">
<button onclick="unlockApp()">Unlock</button>
</div>

<script>

var SAVED_PIN = localStorage.getItem("pmb_pin") || "1234";
var loginPin = "";

/* SAFE START */
window.onload = function(){
setTimeout(()=>{
showScreen("login");
},1200);
};

function showScreen(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* LOGIN */
function pt(d){
if(loginPin.length>=4) return;
loginPin += d;
updateDots("d",loginPin);

if(loginPin.length===4){
if(loginPin===SAVED_PIN){
loginPin="";
showScreen("app");
}
else{
document.getElementById("pin-err").innerText="Wrong PIN";
loginPin="";
updateDots("d","");
}
}
}

function updateDots(prefix,val){
for(let i=0;i<4;i++){
let el=document.getElementById(prefix+i);
if(el){
el.classList.toggle("filled",i<val.length);
}
}
}

/* LOCK */
function lockApp(){
document.getElementById("lock-overlay").classList.add("show");
}

function unlockApp(){
let val=document.getElementById("lock-input").value;
if(val===SAVED_PIN){
document.getElementById("lock-overlay").classList.remove("show");
document.getElementById("lock-input").value="";
}
else alert("Wrong PIN");
}

/* BACKEND */
function checkBackend(){
fetch("https://profitmasterbot-backend-production-11dd.up.railway.app/")
.then(r=>r.json())
.then(d=>alert("Backend OK: "+d.status))
.catch(()=>alert("Backend offline"));
}

</script>

</body>
</html>
