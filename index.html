<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfitMasterBot v6.2</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050816;
    color:white;
}

header{
    padding:18px;
    text-align:center;
    background:#0b1026;
    border-bottom:2px solid #00ff99;
}

h1{color:#00ff99;margin:0;}

.container{padding:15px;}

.card{
    background:#11182f;
    border:1px solid #00ff99;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

.status{
    display:flex;
    justify-content:space-between;
    margin-top:8px;
}

.green{color:#00ff99;}
.red{color:#ff4444;}
.orange{color:#ffaa00;}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    font-weight:bold;
}

.start{background:#00ff99;}
.pause{background:#ffaa00;}
.stop{background:#ff4444;color:white;}

#logs{
    height:160px;
    overflow:auto;
    background:#08101f;
    padding:10px;
    border-radius:10px;
}

.log{font-size:13px;color:#ccc;margin-bottom:4px;}

.online{
    width:10px;height:10px;
    background:#00ff99;
    border-radius:50%;
    display:inline-block;
    margin-right:5px;
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{opacity:1;}
    50%{opacity:0.3;}
    100%{opacity:1;}
}
</style>
</head>

<body>

<header>
<h1>ProfitMasterBot v6.2</h1>
<p>Powered by David Maina</p>
</header>

<div class="container">

<div class="card">
<h2>Bot Status</h2>

<div class="status">
<span>Connection</span>
<span class="green"><span class="online"></span>Connected</span>
</div>

<div class="status">
<span>Trading</span>
<span id="status" class="red">Stopped</span>
</div>

<div class="status">
<span>Exchange</span>
<span class="green">Binance</span>
</div>

<div class="status">
<span>BTC Price</span>
<span class="green" id="btcPrice">$65000</span>
</div>

<button class="start" onclick="startBot()">START</button>
<button class="pause" onclick="pauseBot()">PAUSE</button>
<button class="stop" onclick="stopBot()">STOP</button>

</div>

<div class="card">
<h2>Balance</h2>
<div id="balance">$100.00</div>
<div class="status">
<span>Profit</span>
<span id="profit" class="green">+$0.00</span>
</div>
</div>

<div class="card">
<h2>Logs</h2>
<div id="logs"></div>
</div>

</div>

<script>

let running = false;
let balance = 100;
let profit = 0;
let btcPrice = 65000;

// SAFE ELEMENT CHECKS
const statusEl = document.getElementById("status");
const logsEl = document.getElementById("logs");

function addLog(msg){
    if(!logsEl) return;

    const div = document.createElement("div");
    div.className = "log";
    div.innerText = "[" + new Date().toLocaleTimeString() + "] " + msg;
    logsEl.prepend(div);
}

function startBot(){
    running = true;
    if(statusEl) statusEl.innerText = "Running";
    addLog("Bot started");
    tradeLoop();
}

function pauseBot(){
    running = false;
    if(statusEl) statusEl.innerText = "Paused";
    addLog("Bot paused");
}

function stopBot(){
    running = false;
    if(statusEl) statusEl.innerText = "Stopped";
    addLog("Bot stopped");
}

function tradeLoop(){

    if(!running) return;

    let gain = (Math.random()*5).toFixed(2);

    balance += parseFloat(gain);
    profit += parseFloat(gain);

    const balEl = document.getElementById("balance");
    const profEl = document.getElementById("profit");

    if(balEl) balEl.innerText = "$" + balance.toFixed(2);
    if(profEl) profEl.innerText = "+$" + profit.toFixed(2);

    addLog("Trade +$" + gain);

    setTimeout(tradeLoop, 4000);
}

function updatePrice(){
    btcPrice += (Math.random()*300 - 150);

    const priceEl = document.getElementById("btcPrice");
    if(priceEl) priceEl.innerText = "$" + btcPrice.toFixed(2);
}

setInterval(updatePrice, 3000);

addLog("System ready");

</script>

</body>
</html>
