<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfitMasterBot Dashboard v6.4</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0a0f1f;
    color:white;
}

.header{
    text-align:center;
    padding:20px;
    font-size:22px;
    color:#00ff88;
    font-weight:bold;
}

.grid{
    display:grid;
    gap:15px;
    padding:15px;
}

.card{
    background:#121a33;
    padding:18px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,255,136,0.15);
}

.status{
    font-size:18px;
}

.online{ color:#00ff88; }
.offline{ color:red; }

.small{
    font-size:14px;
    opacity:0.7;
    margin-top:8px;
}

button{
    background:#00ff88;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    font-weight:bold;
    margin-top:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
ProfitMasterBot LIVE Dashboard
</div>

<div class="grid">

    <div class="card">
        <h3>Backend Status</h3>
        <div id="status" class="status offline">Checking...</div>
        <button onclick="checkBackend()">Reconnect</button>
        <div class="small">Connection to Railway backend</div>
    </div>

    <div class="card">
        <h3>Server Info</h3>
        <div id="info">Waiting for response...</div>
    </div>

    <div class="card">
        <h3>Live Time</h3>
        <div id="time">--:--:--</div>
    </div>

</div>

<script>

// YOUR STABLE BACKEND (DO NOT CHANGE)
const API_URL = "https://profitmasterbot-backend-production-11dd.up.railway.app";

// backend check
async function checkBackend(){

    const status = document.getElementById("status");
    const info = document.getElementById("info");

    status.innerHTML = "Checking...";
    status.className = "status offline";

    try{

        const res = await fetch(API_URL + "/health");
        const data = await res.json();

        status.innerHTML = "Backend Connected ✅";
        status.className = "status online";

        info.innerHTML = "Status: " + data.status;

    }catch(err){

        status.innerHTML = "Backend Offline ❌";
        status.className = "status offline";

        info.innerHTML = "No response from server";
    }
}

// live clock
function updateTime(){
    const now = new Date();
    document.getElementById("time").innerText = now.toLocaleTimeString();
}

setInterval(updateTime, 1000);
updateTime();

// auto run
checkBackend();

</script>

</body>
</html>
