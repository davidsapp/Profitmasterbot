<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfitMasterBot v6.4</title>

<style>
body{
    margin:0;
    padding:0;
    background:#0a0f1f;
    font-family:Arial,sans-serif;
    color:white;
    text-align:center;
}

.header{
    background:#111a33;
    padding:20px;
    font-size:28px;
    font-weight:bold;
    color:#00ff99;
}

.container{
    padding:20px;
}

.card{
    background:#16213e;
    margin:15px auto;
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:500px;
    box-shadow:0 0 10px rgba(0,255,153,0.2);
}

.status{
    font-size:22px;
    margin-top:10px;
    font-weight:bold;
}

.green{
    color:#00ff99;
}

.red{
    color:red;
}

.yellow{
    color:yellow;
}

button{
    background:#00ff99;
    color:black;
    border:none;
    padding:15px 25px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    margin:10px;
    width:80%;
}

button:hover{
    opacity:0.9;
}
</style>
</head>

<body>

<div class="header">
    ProfitMasterBot v6.4
</div>

<div class="container">

    <div class="card">
        <h2>Server Status</h2>
        <div id="serverStatus" class="status yellow">
            Connecting...
        </div>
    </div>

    <div class="card">
        <h2>Bot Status</h2>
        <div id="botStatus" class="status yellow">
            Idle
        </div>

        <button onclick="startBot()">Start Bot</button>
        <button onclick="stopBot()">Stop Bot</button>
    </div>

</div>

<script>

let ws;

function connectWebSocket() {

    ws = new WebSocket(
        (location.protocol === "https:" ? "wss://" : "ws://")
        + location.host
    );

    ws.onopen = () => {

        document.getElementById("serverStatus").innerHTML =
            '<span class="green">Connected</span>';

    };

    ws.onmessage = (event) => {

        try {

            const data = JSON.parse(event.data);

            if(data.running){

                document.getElementById("botStatus").innerHTML =
                    '<span class="green">Running</span>';

            } else {

                document.getElementById("botStatus").innerHTML =
                    '<span class="yellow">Idle</span>';

            }

        } catch(err) {
            console.log(err);
        }

    };

    ws.onclose = () => {

        document.getElementById("serverStatus").innerHTML =
            '<span class="red">Disconnected</span>';

        setTimeout(connectWebSocket, 3000);

    };

    ws.onerror = () => {

        document.getElementById("serverStatus").innerHTML =
            '<span class="red">Connection Error</span>';

    };

}

async function startBot(){

    try{
        await fetch("/start", {
            method:"POST"
        });
    }catch(err){
        console.log(err);
    }

}

async function stopBot(){

    try{
        await fetch("/stop", {
            method:"POST"
        });
    }catch(err){
        console.log(err);
    }

}

connectWebSocket();

</script>

</body>
</html>
