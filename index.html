<script>

let socket;

// =========================
// WEBSOCKET CONNECTION
// =========================
function connectSocket() {

    const protocol =
        window.location.protocol === "https:"
        ? "wss:"
        : "ws:";

    socket = new WebSocket(
        protocol + "//" + window.location.host
    );

    socket.onopen = () => {

        document.getElementById(
            "serverStatus"
        ).innerText = "Connected";

        document.getElementById(
            "serverStatus"
        ).style.color = "#00ff99";

    };

    socket.onmessage = (event) => {

        const data = JSON.parse(event.data);

        if (data.balance !== undefined) {
            document.getElementById(
                "balance"
            ).innerText = "$" + data.balance;
        }

        if (data.pnl !== undefined) {
            document.getElementById(
                "pnl"
            ).innerText = data.pnl + "%";
        }

        if (data.botStatus !== undefined) {
            document.getElementById(
                "botStatus"
            ).innerText = data.botStatus;
        }

    };

    socket.onclose = () => {

        document.getElementById(
            "serverStatus"
        ).innerText = "Disconnected";

        document.getElementById(
            "serverStatus"
        ).style.color = "red";

        setTimeout(connectSocket, 3000);

    };

    socket.onerror = () => {
        socket.close();
    };

}

// START CONNECTION
connectSocket();

</script>
