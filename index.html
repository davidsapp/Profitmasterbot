<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfitMasterBot v6.2</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050816;
    color:white;
}

/* HEADER */
header{
    background:#0b1026;
    text-align:center;
    padding:18px;
    border-bottom:2px solid #00ff99;
}

h1{color:#00ff99;margin:0;}

/* CONTAINER */
.container{
    padding:15px;
}

/* CARD */
.card{
    background:#11182f;
    border:1px solid #00ff99;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
}

/* STATUS */
.status{
    display:flex;
    justify-content:space-between;
    margin-top:8px;
}

.green{color:#00ff99;}
.red{color:#ff4444;}
.orange{color:#ffaa00;}

/* BUTTONS */
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    font-weight:bold;
}

.start{background:#00ff99;}
.pause{background:#ffaa00;}
.stop{background:#ff4444;color:white;}

/* BALANCE */
.balance{
    font-size:26px;
    color:#00ff99;
    margin-top:10px;
}

/* LOGS */
.logs{
    height:160px;
    overflow:auto;
    background:#08101f;
    padding:10px;
    border-radius:10px;
}

.log{
    font-size:13px;
    color:#ccc;
    margin-bottom:5px;
}

/* DOT */
.online{
    width:10px;
    height:10px;
    background:#00ff99;
    border-radius:50%;
    display:inline-block;
    margin-right:5px;
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{opacity:1;}
    50%{opacity:0.3;}
    100%{opacity:1;}
}

</style>
</head>

<body>

<header>
<h1>ProfitMasterBot v6.2</h1>
<p>Powered by David Maina</p>
</header>

<div class="container">

<!-- STATUS -->
<div class="card">
<h2>Bot Status</h2>

<div class="status">
<span>Connection</span>
<span class="green"><span class="online"></span>Connected</span>
</div>

<div class="status">
<span>Trading</span>
<span id="status" class="red">Stopped</span>
</div>

<div class="status">
<span>Exchange</span>
<span class="green">Binance</span>
</div>

<div class="status">
<span>BTC Price</span>
<span id="btcPrice">$65000</span>
</div>

<button class="start" onclick="startBot()">START BOT</button>
<button class="pause" onclick="pauseBot()">PAUSE BOT</button>
<button class="stop" onclick="stopBot()">STOP BOT</button>
</div>

<!-- BALANCE -->
<div class="card">
<h2>Account Balance</h2>
<div id="balance">$100.00</div>
<div id="profit">+$0.00</div>
</div>

<!-- LOGS -->
<div class="card">
<h2>Live Logs</h2>
<div class="logs" id="logs"></div>
</div>

</div>

<script>

/* SAFE VARIABLES */
let running = false;
let balance = 100;
let profit = 0;
let btcPrice = 65000;

/* ELEMENTS */
const statusEl = document.getElementById("status");
const logsEl = document.getElementById("logs");
const balEl = document.getElementById("balance");
const profEl = document.getElementById("profit");
const btcEl = document.getElementById("btcPrice");

/* LOG FUNCTION */
function log(msg){
    if(!logsEl) return;

    const div = document.createElement("div");
    div.className = "log";
    div.innerText = "[" + new Date().toLocaleTimeString() + "] " + msg;
    logsEl.prepend(div);
}

/* START BOT */
function startBot(){
    running = true;
    statusEl.innerText = "Running";
    statusEl.className = "green";
    log("Bot started");
    runBot();
}

/* PAUSE BOT */
function pauseBot(){
    running = false;
    statusEl.innerText = "Paused";
    statusEl.className = "orange";
    log("Bot paused");
}

/* STOP BOT */
function stopBot(){
    running = false;
    statusEl.innerText = "Stopped";
    statusEl.className = "red";
    log("Bot stopped");
}

/* TRADING LOOP */
function runBot(){
    if(!running) return;

    let gain = (Math.random()*3).toFixed(2);

    balance += parseFloat(gain);
    profit += parseFloat(gain);

    balEl.innerText = "$" + balance.toFixed(2);
    profEl.innerText = "+$" + profit.toFixed(2);

    log("Trade profit +$" + gain);

    setTimeout(runBot, 4000);
}

/* BTC PRICE LOOP */
setInterval(() => {

    let change = (Math.random()*200 - 100);

    btcPrice += change;

    if(btcPrice < 60000) btcPrice = 60000;
    if(btcPrice > 70000) btcPrice = 70000;

    btcEl.innerText = "$" + btcPrice.toFixed(2);

}, 3000);

/* STARTUP */
window.onload = function(){
    log("System initialized successfully");
};

</script>

</body>
</html>
