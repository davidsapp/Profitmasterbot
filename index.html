<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfitMasterBot v6.2 SAFE</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050816;
    color:white;
}

header{
    padding:18px;
    text-align:center;
    background:#0b1026;
    border-bottom:2px solid #00ff99;
}

h1{color:#00ff99;margin:0;}

.container{padding:15px;}

.card{
    background:#11182f;
    border:1px solid #00ff99;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
}

.status{
    display:flex;
    justify-content:space-between;
    margin-top:8px;
}

.green{color:#00ff99;}
.red{color:#ff4444;}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    font-weight:bold;
}

.start{background:#00ff99;}
.pause{background:#ffaa00;}
.stop{background:#ff4444;color:white;}

#logs{
    height:150px;
    overflow:auto;
    background:#08101f;
    padding:10px;
    border-radius:10px;
}

.log{font-size:13px;color:#ccc;margin-bottom:5px;}

</style>
</head>

<body>

<header>
<h1>ProfitMasterBot v6.2</h1>
<p>Powered by David Maina</p>
</header>

<div class="container">

<div class="card">
<h2>Bot Status</h2>

<div class="status">
<span>Connection</span>
<span class="green">Connected</span>
</div>

<div class="status">
<span>Trading</span>
<span id="status" class="red">Stopped</span>
</div>

<div class="status">
<span>BTC Price</span>
<span id="btcPrice">$65000</span>
</div>

<button class="start" onclick="startBot()">START</button>
<button class="pause" onclick="pauseBot()">PAUSE</button>
<button class="stop" onclick="stopBot()">STOP</button>

</div>

<div class="card">
<h2>Balance</h2>
<div id="balance">$100.00</div>
<div id="profit">+$0.00</div>
</div>

<div class="card">
<h2>Logs</h2>
<div id="logs"></div>
</div>

</div>

<script>

let running = false;
let balance = 100;
let profit = 0;
let btcPrice = 65000;

/* SAFE ELEMENT LOADING */
function el(id){
    return document.getElementById(id);
}

function log(msg){
    const box = el("logs");
    if(!box) return;

    const div = document.createElement("div");
    div.className = "log";
    div.innerText = new Date().toLocaleTimeString() + " " + msg;
    box.prepend(div);
}

function startBot(){
    running = true;
    el("status").innerText = "Running";
    log("Bot started");
    run();
}

function pauseBot(){
    running = false;
    el("status").innerText = "Paused";
    log("Bot paused");
}

function stopBot(){
    running = false;
    el("status").innerText = "Stopped";
    log("Bot stopped");
}

function run(){
    if(!running) return;

    let gain = (Math.random()*3).toFixed(2);

    balance += parseFloat(gain);
    profit += parseFloat(gain);

    el("balance").innerText = "$" + balance.toFixed(2);
    el("profit").innerText = "+$" + profit.toFixed(2);

    log("Trade +" + gain);

    setTimeout(run, 4000);
}

/* BTC PRICE SAFE LOOP */
setInterval(() => {
    btcPrice += (Math.random()*200 - 100);
    el("btcPrice").innerText = "$" + btcPrice.toFixed(2);
}, 3000);

/* START SAFE */
window.onload = () => {
    log("System loaded safely");
};

</script>

</body>
</html>
