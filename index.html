<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfitMasterBot v6.4 - Stage 7</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0f1f;
    color: #ffffff;
}

header {
    padding: 15px;
    background: #121a33;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

.container {
    padding: 15px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 15px;
}

.card {
    background: #121a33;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,255,136,0.2);
}

.status {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    margin: 5px 0;
}

.green { color: #00ff88; }
.red { color: #ff4d4d; }
.yellow { color: #ffd000; }

button {
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 8px;
    background: #00ff88;
    color: #000;
    font-weight: bold;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background: #00cc6a;
}

.log {
    height: 220px;
    overflow-y: auto;
    background: #0f1730;
    padding: 10px;
    font-size: 12px;
    border-radius: 8px;
}

.small {
    font-size: 12px;
    opacity: 0.8;
    margin-top: 8px;
}
</style>
</head>

<body>

<header>
🚀 ProfitMasterBot v6.4 - STAGE 7 LIVE DASHBOARD
</header>

<div class="container">

    <!-- CONNECTION STATUS -->
    <div class="card">
        <h3>Connection Status</h3>
        <div class="status">
            <div>Server: <span id="serverStatus" class="yellow">Connecting...</span></div>
            <div>Bot: <span id="botStatus" class="yellow">Idle</span></div>
        </div>
    </div>

    <!-- LIVE STATS -->
    <div class="card">
        <h3>Live Trading Stats</h3>

        <div class="status">
            <div>Balance: <span id="balance">$0.00</span></div>
            <div>Profit: <span id="profit" class="green">$0.00</span></div>
        </div>

        <div class="status">
            <div>Daily Loss: <span id="loss" class="red">0</span></div>
            <div>Trades: <span id="trades">0</span></div>
        </div>
    </div>

    <!-- BOT CONTROL -->
    <div class="card">
        <h3>Bot Control</h3>

        <button onclick="startBot()">Start Bot</button>
        <button onclick="stopBot()">Stop Bot</button>

        <p class="small">Stage 7: SSE Live Sync Enabled</p>
    </div>

    <!-- LOGS -->
    <div class="card">
        <h3>Live Trade Logs</h3>
        <div class="log" id="logBox"></div>
    </div>

</div><script>

let eventSource;

// =========================
// SSE CONNECTION
// =========================

function connectSSE() {
    try {
        eventSource = new EventSource("/events");

        eventSource.onopen = () => {
            document.getElementById("serverStatus").innerText = "Connected";
            document.getElementById("serverStatus").className = "green";
        };

        eventSource.onmessage = (event) => {
            const data = JSON.parse(event.data);

            // STATS UPDATE
            if (data.type === "stats") {
                document.getElementById("balance").innerText = "$" + data.balance;
                document.getElementById("profit").innerText = "$" + data.profit;
                document.getElementById("loss").innerText = data.loss;
                document.getElementById("trades").innerText = data.trades;
            }

            // LOG UPDATE
            if (data.type === "log") {
                addLog(data.message);
            }

            // BOT STATUS
            if (data.type === "bot") {
                const bot = document.getElementById("botStatus");
                bot.innerText = data.status;

                if (data.status === "Running") {
                    bot.className = "green";
                } else if (data.status === "Stopped") {
                    bot.className = "red";
                } else {
                    bot.className = "yellow";
                }
            }
        };

        eventSource.onerror = () => {
            document.getElementById("serverStatus").innerText = "Disconnected";
            document.getElementById("serverStatus").className = "red";
        };

    } catch (e) {
        console.log("SSE not supported");
    }
}

// =========================
// LOG FUNCTION
// =========================

function addLog(msg) {
    const box = document.getElementById("logBox");
    const time = new Date().toLocaleTimeString();
    box.innerHTML += `[${time}] ${msg}<br>`;
    box.scrollTop = box.scrollHeight;
}

// =========================
// BOT CONTROLS
// =========================

function startBot() {
    fetch("/start", { method: "POST" });
    addLog("Command sent: START BOT");
}

function stopBot() {
    fetch("/stop", { method: "POST" });
    addLog("Command sent: STOP BOT");
}

// =========================
// INIT
// =========================

connectSSE();

</script>

</body>
</html>
