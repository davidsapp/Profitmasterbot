<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfitMasterBot v9.3 LOGIN</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050816;
    color:white;
}

/* LOGIN SCREEN */
#loginBox{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:#11182f;
    padding:20px;
    border-radius:12px;
    width:300px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#00ff99;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.hidden{
    display:none;
}

/* APP */
.header{
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#0b1024;
}

.logo{
    color:#00ff99;
    font-weight:bold;
}

.tabbar{
    display:flex;
    gap:10px;
    padding:10px;
    background:#0b1024;
}

.tab{
    padding:8px 12px;
    background:#11182f;
    border-radius:8px;
    cursor:pointer;
}

.section{
    display:none;
    padding:15px;
}

.section.active{
    display:block;
}
</style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="loginBox">
    <div class="card">
        <h2>ProfitMasterBot Login</h2>

        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">

        <button onclick="login()">Login</button>
        <button onclick="register()">Register</button>

        <p id="msg"></p>
    </div>
</div>

<!-- ================= APP ================= -->
<div id="app" class="hidden">

    <div class="header">
        <div class="logo">ProfitMasterBot v9.3</div>
        <button onclick="logout()" style="width:auto;">Logout</button>
    </div>

    <div class="tabbar">
        <div class="tab" onclick="show('dash')">Dashboard</div>
        <div class="tab" onclick="show('convert')">Converter</div>
        <div class="tab" onclick="show('mpesa')">M-Pesa</div>
    </div>

    <div id="dash" class="section active">
        <h2>Welcome to Secure Dashboard</h2>
        <p id="userEmail"></p>
    </div>

    <div id="convert" class="section">
        <h3>Converter</h3>
        <input placeholder="USD">
        <button>Convert</button>
    </div>

    <div id="mpesa" class="section">
        <h3>M-Pesa Panel</h3>
        <p>Till: 9210444</p>
    </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAl9mVCRlylurCPyT6fjW0sGIajc0v1QLk",
  authDomain: "profitmasterbot-d9d9c.firebaseapp.com",
  projectId: "profitmasterbot-d9d9c",
  storageBucket: "profitmasterbot-d9d9c.firebasestorage.app",
  messagingSenderId: "531770330234",
  appId: "1:531770330234:web:ac9696195b469b965fffc3"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* ================= LOGIN ================= */
function login(){
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
    .then(user=>{
        document.getElementById("msg").innerText = "Login successful";
    })
    .catch(err=>{
        document.getElementById("msg").innerText = err.message;
    });
}

/* ================= REGISTER ================= */
function register(){
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, password)
    .then(user=>{
        document.getElementById("msg").innerText = "Account created";
    })
    .catch(err=>{
        document.getElementById("msg").innerText = err.message;
    });
}

/* ================= LOGOUT ================= */
function logout(){
    auth.signOut();
}

/* ================= AUTH STATE ================= */
auth.onAuthStateChanged(user=>{
    if(user){
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");

        document.getElementById("userEmail").innerText = user.email;
    }else{
        document.getElementById("loginBox").classList.remove("hidden");
        document.getElementById("app").classList.add("hidden");
    }
});

/* TAB SWITCH */
function show(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
