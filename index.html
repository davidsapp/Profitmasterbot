<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfitMasterBot v7.0</title>

<style>
:root{
  --bg:#0a0f1f;
  --card:#121a33;
  --neon:#00ff88;
  --text:#fff;
  --danger:#ff4d4d;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#0f1730;
  border-bottom:1px solid #1f2a4a;
}

.logo{ color:var(--neon); font-weight:bold; }

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  padding:15px;
}

/* CARD */
.card{
  background:var(--card);
  padding:15px;
  border-radius:12px;
}

/* BUTTONS */
button{
  background:var(--neon);
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  margin:5px 0;
}

/* STATUS DOT */
.dot{
  width:10px;height:10px;border-radius:50%;
  display:inline-block;margin-right:5px;
}
.green{background:var(--neon);}
.red{background:var(--danger);}

/* LOG BOX */
.log{
  height:150px;
  overflow:auto;
  background:#0b1022;
  padding:10px;
  font-size:12px;
  border-radius:8px;
}

/* LOCK */
.lock{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
input{
  padding:10px;
  margin-top:10px;
}
canvas{
  width:100%;
  background:#0b1022;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- LOCK -->
<div class="lock" id="lock">
  <h2>ProfitMasterBot Locked</h2>
  <input type="password" id="pass" placeholder="Enter PIN">
  <button onclick="unlock()">Unlock</button>
</div>

<!-- HEADER -->
<div class="header">
  <div class="logo">ProfitMasterBot v7.0</div>
  <div>
    <span class="dot green"></span>
    <span id="botState">RUNNING</span>
  </div>
</div>

<!-- DASHBOARD -->
<div class="grid">

  <div class="card">
    <h3>Balance</h3>
    <h2 id="balance">$1,250.00</h2>
  </div>

  <div class="card">
    <h3>Profit Today</h3>
    <h2 id="profit">+$0.00</h2>
  </div>

  <div class="card">
    <h3>Bot Controls</h3>
    <button onclick="startBot()">Start Bot</button>
    <button onclick="stopBot()">Stop Bot</button>
  </div>

  <div class="card">
    <h3>Exchange Status</h3>
    <p>Binance: <span id="binance">DISCONNECTED</span></p>
    <p>Deriv: <span id="deriv">DISCONNECTED</span></p>
    <button onclick="connect()">Connect APIs</button>
  </div>

</div>

<!-- CHART + LOGS -->
<div class="grid">

  <div class="card">
    <h3>Profit Chart</h3>
    <canvas id="chart" height="120"></canvas>
  </div>

  <div class="card">
    <h3>Trade Logs</h3>
    <div class="log" id="log"></div>
  </div>

</div>

<script>

let running = true;
let profit = 0;
let data = [10,20,15,30,25,40];

function unlock(){
  if(document.getElementById("pass").value==="1234"){
    document.getElementById("lock").style.display="none";
  } else {
    alert("Wrong PIN");
  }
}

function log(msg){
  const box = document.getElementById("log");
  box.innerHTML += msg + "<br>";
  box.scrollTop = box.scrollHeight;
}

function startBot(){
  running = true;
  document.getElementById("botState").innerText="RUNNING";
  log("Bot started");
}

function stopBot(){
  running = false;
  document.getElementById("botState").innerText="STOPPED";
  log("Bot stopped");
}

function connect(){
  document.getElementById("binance").innerText="CONNECTED";
  document.getElementById("deriv").innerText="CONNECTED";
  log("APIs connected");
}

/* SIMULATION LOOP */
setInterval(()=>{
  if(running){
    let change = (Math.random()*10 - 3);
    profit += change;

    document.getElementById("profit").innerText = "+"+profit.toFixed(2);

    data.push(profit);
    if(data.length>20) data.shift();

    drawChart();
    log("Trade executed: "+change.toFixed(2));
  }
},3000);

/* SIMPLE CHART */
function drawChart(){
  const c = document.getElementById("chart");
  const ctx = c.getContext("2d");

  ctx.clearRect(0,0,c.width,c.height);

  ctx.beginPath();
  ctx.moveTo(0,60);

  for(let i=0;i<data.length;i++){
    let x = i*(c.width/data.length);
    let y = 60 - data[i];
    ctx.lineTo(x,y);
  }

  ctx.strokeStyle="#00ff88";
  ctx.stroke();
}

drawChart();

</script>

</body>
</html>
