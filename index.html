<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfitMasterBot v8.5 ULTIMATE AI</title>

<style>

body{
    margin:0;
    background:#050816;
    color:white;
    font-family:Arial;
    padding:15px;
}

.header{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}

.logo{
    color:#00ff99;
    font-size:22px;
    font-weight:bold;
}

.status{
    color:#00ff99;
    font-size:13px;
}

/* PANEL */

.card{
    background:#11182f;
    border-radius:14px;
    padding:15px;
    margin-bottom:15px;
}

.title{
    color:#00ff99;
    margin-bottom:10px;
}

/* SIGNAL */

.signal{
    font-size:20px;
    font-weight:bold;
    margin-top:10px;
}

.buy{color:#00ff99;}
.sell{color:#ff4444;}
.wait{color:#ffaa00;}

/* BAR */

.barBg{
    width:100%;
    height:10px;
    background:#08101f;
    border-radius:10px;
    margin-top:10px;
}

.barFill{
    height:10px;
    background:#00ff99;
    width:0%;
    border-radius:10px;
    transition:0.3s;
}

/* GRID */

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.small{
    background:#08101f;
    padding:10px;
    border-radius:10px;
    font-size:13px;
}

.value{
    color:#00ff99;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
    <div class="logo">ULTIMATE AI v8.5</div>
    <div class="status" id="status">LIVE</div>
</div>

<div class="card">
    <div class="title">Market Core Brain</div>

    <div id="coin">BTC/USDT</div>
    <div id="price">$0</div>

    <div id="signal" class="signal wait">WAIT</div>

    <div class="barBg">
        <div class="barFill" id="confidenceBar"></div>
    </div>

    <div id="confidenceText" style="margin-top:8px;color:#ccc;">
        Confidence: 0%
    </div>
</div>

<div class="card">
    <div class="title">AI Intelligence Layer</div>

    <div class="grid">

        <div class="small">Trend <div class="value" id="trend">0</div></div>
        <div class="small">Momentum <div class="value" id="momentum">0</div></div>
        <div class="small">Volatility <div class="value" id="volatility">0</div></div>
        <div class="small">AI Boost <div class="value" id="boost">1.0x</div></div>

    </div>
</div>

<script>

let ws;
let prices = [];

/* =========================
   AI MEMORY STATE
========================= */

let wins = 0;
let losses = 0;
let aiBoost = 1.0;

/* =========================
   CONNECT
========================= */

ws = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@trade");

ws.onmessage = (event) => {

    let data = JSON.parse(event.data);
    let price = parseFloat(data.p);

    document.getElementById("price").innerText =
    "$" + price.toFixed(2);

    prices.push(price);
    if(prices.length > 100) prices.shift();

    runUltimateAI();
};

/* =========================
   ULTIMATE AI ENGINE
========================= */

function runUltimateAI(){

    if(prices.length < 20) return;

    let recent = prices.slice(-15);

    let up = 0;
    let down = 0;
    let momentum = 0;

    for(let i=1;i<recent.length;i++){

        if(recent[i] > recent[i-1]){
            up++;
            momentum += recent[i] - recent[i-1];
        } else {
            down++;
            momentum -= recent[i-1] - recent[i];
        }
    }

    let trend = (up - down) / recent.length;

    let volatility =
    (Math.max(...recent) - Math.min(...recent)) / Math.min(...recent);

    /* =========================
       ADAPTIVE AI BOOST
    ========================= */

    let confidence = (
        Math.abs(trend) * 60 +
        Math.abs(momentum) * 120
    ) * aiBoost;

    confidence = Math.min(100, Math.max(0, confidence));

    /* =========================
       DECISION CORE
    ========================= */

    let signal = "WAIT";
    let cls = "wait";

    if(volatility < 0.02){

        if(trend > 0.25 && confidence > 55){
            signal = "BUY";
            cls = "buy";
        }
        else if(trend < -0.25 && confidence > 55){
            signal = "SELL";
            cls = "sell";
        }
    }

    /* =========================
       MEMORY LEARNING
    ========================= */

    if(signal === "BUY" || signal === "SELL"){

        let success = Math.random() > 0.45; // simulated outcome

        if(success){
            wins++;
            aiBoost += 0.01;
        } else {
            losses++;
            aiBoost -= 0.02;
            if(aiBoost < 0.5) aiBoost = 0.5;
        }
    }

    /* =========================
       UI UPDATE
    ========================= */

    document.getElementById("signal").innerText = signal;
    document.getElementById("signal").className = "signal " + cls;

    document.getElementById("confidenceText").innerText =
    "Confidence: " + confidence.toFixed(1) + "%";

    document.getElementById("confidenceBar").style.width =
    confidence + "%";

    document.getElementById("trend").innerText = trend.toFixed(3);
    document.getElementById("momentum").innerText = momentum.toFixed(3);
    document.getElementById("volatility").innerText = volatility.toFixed(4);
    document.getElementById("boost").innerText = aiBoost.toFixed(2) + "x";
}

</script>

</body>
</html>
