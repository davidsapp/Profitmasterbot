<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">

<title>ProfitMasterBot v6.2.0</title>

<link rel="icon" href="logo.svg">
<link rel="apple-touch-icon" href="logo.svg">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

:root{
  --bg:#050d1a;--card:#0a1628;--card2:#0f1f35;--border:#1a3a5c;
  --neon:#00ff88;--cyan:#00ccff;--blue:#0066ff;--red:#ff3366;
  --gold:#ffd700;--white:#e8f4fd;--grey:#6b8db0;
}

body{
  background:var(--bg);
  color:var(--white);
  font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  user-select:none;
}

/* SCREENS */
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}

/* SPLASH */
#splash{
  background:#000;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:30px;
  position:relative;
}

.splash-p{
  font-size:120px;
  font-style:italic;
  font-weight:900;
  color:var(--gold);
  text-shadow:0 0 30px #ffd70088;
}

.splash-arrow{
  font-size:60px;
  transform:rotate(-45deg);
  color:var(--gold);
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 16px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  position:sticky;
  top:0;
  z-index:100;
}

.topbar-title{
  color:var(--neon);
  font-size:15px;
  font-weight:900;
}

/* FIXED BOTTOM NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:var(--card);
  border-top:1px solid var(--border);
  display:flex;
  justify-content:space-around;
  padding:6px 0;
  z-index:200;
}

/* CARDS */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  margin-bottom:14px;
}

.btn{
  width:100%;
  border:none;
  border-radius:12px;
  padding:14px;
  font-weight:900;
  cursor:pointer;
}

.btn-neon{background:var(--neon);color:#000;}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="screen active">
  <div class="splash-p">P</div>
  <div class="splash-arrow">↗</div>
</div>

<!-- LOGIN -->
<div id="login" class="screen">
  <div style="margin:auto;text-align:center;">
    <h2>Enter PIN</h2>
    <p>Default: 1234</p>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="screen active">

  <div class="topbar">
    <div class="topbar-title">ProfitMasterBot</div>
    <div style="color:var(--neon);font-size:12px;">LIVE</div>
  </div>

  <div style="padding:12px;">

    <div class="card">
      <h3>Total Portfolio</h3>
      <h1 style="color:var(--neon);">$24,831.47</h1>
    </div>

    <div class="card">
      <h3>Daily P&L</h3>
      <h2 style="color:var(--neon);">+$1,247</h2>
    </div>

    <div class="card">
      <h3>Live Trades</h3>
      <p>BTC/USDT +$124</p>
      <p>ETH/USDT +$67</p>
    </div>

    <button class="btn btn-neon">AUTO TRADE ACTIVE</button>

  </div>
</div>

</body>
</html>
