<!DOCTYPE html>
<html>
<head>
<title>ProfitMasterBot v6.2</title>
</head>

<body style="background:#050816;color:white;font-family:Arial;text-align:center;padding:20px;">

<h1 style="color:#00ff99;">ProfitMasterBot v6.2</h1>

<p>System Status: <span id="status" style="color:#00ff99;">ONLINE</span></p>

<p>BTC Price: <span id="btc">Loading...</span></p>

<p>Balance: $100</p>

<button onclick="start()">START BOT</button>

<script>

let btc = 65000;

function updateBTC(){
    btc += (Math.random()*200 - 100);
    document.getElementById("btc").innerText = "$" + btc.toFixed(2);
}

function start(){
    document.getElementById("status").innerText = "RUNNING";
    setInterval(updateBTC, 2000);
}

</script>

</body>
</html>
