<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ProfitMasterBot v7.7 CHART AI</title>

<style>

body{
    margin:0;
    background:#050816;
    color:white;
    font-family:Arial;
    padding:15px;
}

/* HEADER */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.logo{
    color:#00ff99;
    font-size:22px;
    font-weight:bold;
}

.status{
    color:#00ff99;
    font-size:13px;
}

/* CARDS */

.card{
    background:#11182f;
    border-radius:16px;
    padding:15px;
    margin-bottom:15px;
}

.title{
    color:#00ff99;
    font-size:16px;
    margin-bottom:10px;
}

.value{
    font-size:22px;
    color:white;
}

/* CHART */

canvas{
    width:100%;
    background:#08101f;
    border-radius:12px;
    margin-top:10px;
}

/* SIGNAL */

.signal{
    font-size:18px;
    font-weight:bold;
    margin-top:10px;
}

.buy{ color:#00ff99; }
.sell{ color:#ff4444; }
.wait{ color:#ffaa00; }

</style>
</head>

<body>

<div class="header">
    <div class="logo">Chart AI v7.7</div>
    <div class="status" id="status">OFFLINE</div>
</div>

<div class="card">
    <div class="title">BTC Price</div>
    <div class="value" id="price">$0</div>

    <div class="signal" id="signal">WAITING</div>
</div>

<div class="card">
    <div class="title">Market Intelligence Chart</div>
    <canvas id="chart" height="180"></canvas>
</div>

<div class="card">
    <div class="title">AI Insight</div>
    <div class="value" id="insight">Analyzing market...</div>
</div>

<script>

let ws;
let prices = [];

let maPeriod = 5;   // Moving average window

/* =========================
   CONNECT BINANCE
========================= */

ws = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@trade");

ws.onopen = () => {
    document.getElementById("status").innerText = "LIVE";
};

ws.onmessage = (event) => {

    let data = JSON.parse(event.data);
    let price = parseFloat(data.p);

    document.getElementById("price").innerText =
    "$" + price.toFixed(2);

    prices.push(price);

    if(prices.length > 60){
        prices.shift();
    }

    analyzeMarket();
    drawChart();
};

/* =========================
   MOVING AVERAGE FUNCTION
========================= */

function movingAverage(index){

    if(index < maPeriod) return prices[index];

    let sum = 0;

    for(let i = index - maPeriod; i < index; i++){
        sum += prices[i];
    }

    return sum / maPeriod;
}

/* =========================
   MARKET ANALYSIS ENGINE
========================= */

function analyzeMarket(){

    if(prices.length < maPeriod + 5) return;

    let latest = prices[prices.length - 1];

    let ma = movingAverage(prices.length - 1);

    let prevMA = movingAverage(prices.length - 2);

    let trend = ma - prevMA;

    let max = Math.max(...prices);
    let min = Math.min(...prices);

    let volatility = (max - min) / min;

    let signal = "WAIT";
    let cls = "wait";

    /* =========================
       SIGNAL LOGIC
    ========================= */

    if(latest > ma && trend > 0){

        signal = "BUY";
        cls = "buy";

    } else if(latest < ma && trend < 0){

        signal = "SELL";
        cls = "sell";

    } else {

        signal = "WAIT";
        cls = "wait";
    }

    /* =========================
       HIGH VOLATILITY FILTER
    ========================= */

    if(volatility > 0.015){

        signal = "RISKY MARKET";
        cls = "wait";
    }

    document.getElementById("signal").innerText = signal;
    document.getElementById("signal").className = "signal " + cls;

    /* =========================
       AI INSIGHT TEXT
    ========================= */

    let insight = "";

    if(volatility < 0.01){
        insight = "Stable market detected (good for trading)";
    } else if(volatility < 0.02){
        insight = "Moderate volatility (caution)";
    } else {
        insight = "High volatility (avoid entries)";
    }

    document.getElementById("insight").innerText = insight;
}

/* =========================
   DRAW INTELLIGENT CHART
========================= */

function drawChart(){

    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(prices.length < 2) return;

    let min = Math.min(...prices);
    let max = Math.max(...prices);
    let range = max - min || 1;

    let step = canvas.width / (prices.length - 1);

    /* PRICE LINE */

    ctx.beginPath();
    ctx.strokeStyle = "#00ff99";
    ctx.lineWidth = 2;

    prices.forEach((p,i)=>{

        let x = i * step;
        let y = canvas.height - ((p-min)/range)*canvas.height;

        if(i === 0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    });

    ctx.stroke();

    /* MOVING AVERAGE LINE */

    ctx.beginPath();
    ctx.strokeStyle = "#ffaa00";
    ctx.lineWidth = 2;

    prices.forEach((p,i)=>{

        let ma = movingAverage(i);

        let x = i * step;
        let y = canvas.height - ((ma-min)/range)*canvas.height;

        if(i === 0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    });

    ctx.stroke();
}

</script>

</body>
</html>
